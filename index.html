<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MF Portfolio Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Mutual Fund Portfolio Calculator</h1>

        <p id="statusMessage" aria-live="polite">Loading funds...</p>

        <label for="fundSelect">Select Fund</label>
        <select id="fundSelect" disabled>
            <option>Loading funds...</option>
        </select>

        <label for="units">Enter Units</label>
        <input type="number" id="units" placeholder="e.g. 100" min="0" step="any">

        <button onclick="calculateValue()">Calculate Value</button>

        <div class="result">
            <h2 id="navValue"></h2>
            <h2 id="portfolioValue"></h2>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
