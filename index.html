<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MF Portfolio Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Mutual Fund Portfolio Calculator</h1>

        <label>Select Fund</label>
        <select id="fundSelect">
            <option>Loading funds...</option>
        </select>

        <label>Enter Units</label>
        <input type="number" id="units" placeholder="e.g. 100">

        <button onclick="calculateValue()">Calculate Value</button>

        <div class="result">
            <h2 id="navValue"></h2>
            <h2 id="portfolioValue"></h2>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
